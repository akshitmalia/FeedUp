<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedUp - Register</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark text-light">

  <div class="container mt-5">
    <!-- Heading -->
    <h1 class="display-3 fw-bold text-primary text-center">FeedUp Platform</h1>
    <p class="fs-5 mt-3 text-center text-light">
      Register below to join the FeedUp community. Share your thoughts anonymously, 
      upvote posts, and explore trending ideas.
    </p>

    <!-- Registration Form -->
    <div class="row justify-content-center mt-4">
      <div class="col-md-6">
        <div class="card custom-card shadow-lg">
          <div class="card-body">
            <h3 class="card-title text-center mb-4 text-primary">Create Your Account</h3>
            <form>
              <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Email address</label>
                <input type="email" class="form-control custom-input" id="exampleInputEmail1" aria-describedby="emailHelp" required>
                <div id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</div>
              </div>
              <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Password</label>
                <input type="password" class="form-control custom-input" id="exampleInputPassword1" required>
              </div>
              <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="exampleCheck1">
                <label class="form-check-label" for="exampleCheck1">Remember me</label>
              </div>
              <button onclick="registerUser()" type="button" class="btn btn-danger w-100 custom-btn">Register</button>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script>
async function registerUser() {
  const email = document.getElementById("exampleInputEmail1").value;
  const password = document.getElementById("exampleInputPassword1").value;

  const res = await fetch("/feedup/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (res.ok) {
    // Redirect to protected page
//localStorage.setItem("token", data.token);
window.location.href = "/feedup";

  } else {
    alert(data.error || "Registration failed");
  }
}
