<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedUp - Login</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark text-light">

  <div class="container mt-5">
    <!-- Heading -->
    <h1 class="display-3 fw-bold text-primary text-center">FeedUp Platform</h1>
    <p class="fs-5 mt-3 text-center text-light">
      Welcome back! Log in to continue posting, upvoting, and exploring the FeedUp community.
    </p>

    <!-- Login Form -->
    <div class="row justify-content-center mt-4">
      <div class="col-md-6">
        <div class="card custom-card shadow-lg">
          <div class="card-body">
            <h3 class="card-title text-center mb-4 text-primary">Login to Your Account</h3>
            <form>
              <div class="mb-3">
                <label for="loginEmail" class="form-label">Email address</label>
                <input type="email" class="form-control custom-input" id="loginEmail" required>
              </div>
              <div class="mb-3">
                <label for="loginPassword" class="form-label">Password</label>
                <input type="password" class="form-control custom-input" id="loginPassword" required>
              </div>
              <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe">Remember me</label>
              </div>
              <!-- <button onclick="loginUser()" class="btn btn-info w-100 custom-btn">Login</button> -->
               <button type="button" onclick="loginUser()" class="btn btn-info w-100 custom-btn">Login</button>
            </form>
            <p class="mt-3 text-center">
              Don’t have an account? <a href="/feedup/register" class="text-primary">Register here</a>
            </p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

async function loginUser() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const res = await fetch("/feedup/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  if (res.ok) {
    window.location.href = "/feedup";
  } else {
    const data = await res.json();
    alert(data.error || "Login failed");
  }
}
